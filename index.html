<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Grade 10 Learning Portal</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#1e293b;
padding:20px;
font-size:28px;
}

.container{
padding:30px;
}

button{
padding:12px 20px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

.hidden{
display:none;
}

iframe{
width:90%;
height:700px;
border:none;
margin-top:20px;
}

.quiz{
background:#1e293b;
padding:20px;
border-radius:10px;
width:60%;
margin:auto;
}

.answer{
display:block;
margin:8px;
}

</style>

</head>
<body>

<header>Grade 10 Learning Portal</header>

<div class="container">

<h2>Select a Book</h2>

<div id="books">

<button onclick="openBook('ma')">Mathematics</button>
<button onclick="openBook('ara')">Arabic</button>
<button onclick="openBook('en')">English</button>
<button onclick="openBook('re')">Religion</button>
<button onclick="openBook('sc')">Science</button>
<button onclick="openBook('chm')">Chemistry</button>
<button onclick="openBook('py')">Physics</button>
<button onclick="openBook('ge')">Geography</button>
<button onclick="openBook('it')">IT</button>
<button onclick="openBook('taj')">Tajweed</button>

</div>

<div id="bookArea" class="hidden">

<h2 id="bookTitle"></h2>

<button onclick="showPDF()">Open Full Book</button>
<button onclick="showQuiz()">Take Quiz</button>
<button onclick="goHome()">Back</button>

<div id="pdfArea"></div>

<div id="quizArea" class="hidden">

<div class="quiz">

<h3 id="question"></h3>

<div id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">Next Question</button>

</div>

</div>

</div>

</div>

<script>

let currentBook=""

const pdfs={
ma:"https://elearn.azureedge.net/Books/c10/ma10-p2.pdf",
ara:"https://elearn.azureedge.net/Books/c10/ara10-p2.pdf",
en:"https://elearn.azureedge.net/Books/c10/en10-p2.pdf",
re:"https://elearn.azureedge.net/Books/c10/re10-p2.pdf",
sc:"https://elearn.azureedge.net/Books/c10/sc10.pdf",
chm:"https://elearn.azureedge.net/Books/c10/chm10.pdf",
py:"https://elearn.azureedge.net/Books/c10/py10.pdf",
ge:"https://elearn.azureedge.net/Books/c10/ge10-p2.pdf",
it:"https://elearn.azureedge.net/Books/c10/it10.pdf",
taj:"https://elearn.azureedge.net/Books/c10/taj10.pdf"
}

function openBook(book){

currentBook=book

document.getElementById("books").classList.add("hidden")
document.getElementById("bookArea").classList.remove("hidden")

document.getElementById("bookTitle").innerText=book.toUpperCase()+" Book"

}

function goHome(){

document.getElementById("books").classList.remove("hidden")
document.getElementById("bookArea").classList.add("hidden")

document.getElementById("pdfArea").innerHTML=""
document.getElementById("quizArea").classList.add("hidden")

}

function showPDF(){

document.getElementById("quizArea").classList.add("hidden")

document.getElementById("pdfArea").innerHTML=
`<iframe src="${pdfs[currentBook]}"></iframe>`

}

const questions=[

{
q:"What is 2 + 2?",
a:["3","4","5","6"],
c:1
},

{
q:"What is sin(90°)?",
a:["0","1","-1","2"],
c:1
},

{
q:"What is 10 × 5?",
a:["20","40","50","60"],
c:2
},

{
q:"Capital of France?",
a:["London","Berlin","Paris","Rome"],
c:2
}

]

let qIndex=0

function showQuiz(){

document.getElementById("pdfArea").innerHTML=""
document.getElementById("quizArea").classList.remove("hidden")

loadQuestion()

}

function loadQuestion(){

let q=questions[qIndex]

document.getElementById("question").innerText=q.q

let answersHTML=""

q.a.forEach((ans,i)=>{

answersHTML+=`<button class="answer" onclick="check(${i})">${ans}</button>`

})

document.getElementById("answers").innerHTML=answersHTML

document.getElementById("result").innerText=""

}

function check(i){

if(i===questions[qIndex].c)
document.getElementById("result").innerText="Correct!"
else
document.getElementById("result").innerText="Wrong"

}

function nextQuestion(){

qIndex++

if(qIndex>=questions.length)
qIndex=0

loadQuestion()

}

</script>

</body>
</html>
