<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math 10 - Part 2 Study Tool</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .lesson-selector {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            text-align: center;
        }

        select {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin: 1rem 0;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 600;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .quiz-container {
            display: none;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text-main);
            text-align: left;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .option-btn.correct {
            background: #dcfce7;
            border-color: var(--success);
            color: #166534;
        }

        .option-btn.wrong {
            background: #fee2e2;
            border-color: var(--danger);
            color: #991b1b;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .results-container {
            display: none;
            text-align: center;
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .results-container h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .final-score {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Math Study Tool</h1>
        <p>Select a lesson below to begin your 50-question quiz.</p>
    </header>

    <div id="selection-screen" class="lesson-selector">
        <h2>Choose a Lesson</h2>
        <select id="lesson-select">
            <option value="" disabled selected>Select a lesson...</option>
            <option value="lesson1">Lesson 1: Algebra & Equations (50 Qs)</option>
            <option value="lesson2">Lesson 2: Geometry & Areas (50 Qs)</option>
            <option value="lesson3">Lesson 3: Number Theory & Arithmetic (50 Qs)</option>
        </select>
        <br>
        <button id="start-btn" onclick="startQuiz()">Start Studying</button>
    </div>

    <div id="quiz-screen" class="quiz-container">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        
        <div class="question-header">
            <span id="question-counter">Question 1 of 50</span>
            <span class="score-display">Score: <span id="current-score">0</span></span>
        </div>

        <div id="question-text" class="question-text">
            Loading question...
        </div>

        <div id="options-grid" class="options-grid">
            </div>

        <div class="controls">
            <button id="quit-btn" onclick="quitQuiz()" style="background: var(--text-muted)">Quit</button>
            <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
        </div>
    </div>

    <div id="results-screen" class="results-container">
        <h2>Quiz Complete!</h2>
        <p>Your final score is</p>
        <div id="final-score" class="final-score">0 / 50</div>
        <div class="nav-buttons">
            <button onclick="retryQuiz()">Retry Lesson</button>
            <button onclick="quitQuiz()" style="background: var(--text-muted)">Choose Another Lesson</button>
        </div>
    </div>
</div>

    /**
     * Start the quiz with the selected lesson
     */
    function startQuiz() {
        const selected = lessonSelect.value;
        if (!selected) {
            alert('Please select a lesson first!');
            return;
        }

        // Deep copy the array to prevent modifying original data
        currentLesson = JSON.parse(JSON.stringify(database[selected]));
        
        // Reset state
        currentQuestionIndex = 0;
        score = 0;
        
        // UI transitions
        selectionScreen.style.display = 'none';
        resultsScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        
        updateScore();
        loadQuestion();
    }

    /**
     * Load the current question onto the screen
     */
    function loadQuestion() {
        selectedOption = null;
        nextBtn.disabled = true;
        
        const qData = currentLesson[currentQuestionIndex];
        
        // Update Counter & Progress Bar
        const qNum = currentQuestionIndex + 1;
        const totalQ = currentLesson.length;
        questionCounter.innerText = `Question ${qNum} of ${totalQ}`;
        progressFill.style.width = `${(qNum / totalQ) * 100}%`;

        // Update Text
        questionText.innerText = qData.q;

        // Render Options
        optionsGrid.innerHTML = '';
        qData.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index, btn);
            optionsGrid.appendChild(btn);
        });
    }

     */
    function selectOption(selectedIndex, btnElement) {
        // Prevent clicking multiple times
        if (selectedOption !== null) return;
        
        selectedOption = selectedIndex;
        const qData = currentLesson[currentQuestionIndex];
        const isCorrect = (selectedIndex === qData.a);
        
        // Highlight logic
        const allBtns = optionsGrid.children;
        for (let i = 0; i < allBtns.length; i++) {
            allBtns[i].disabled = true;
            if (i === qData.a) {
                allBtns[i].classList.add('correct');
            } else if (i === selectedIndex && !isCorrect) {
                allBtns[i].classList.add('wrong');
            }
        }

        if (isCorrect) {
            score++;
            updateScore();
        }

        // Enable next button
        nextBtn.disabled = false;
        
        // Change next button text on last question
        if (currentQuestionIndex === currentLesson.length - 1) {
            nextBtn.innerText = 'Finish Quiz';
        } else {
            nextBtn.innerText = 'Next Question';
        }
    }

    /**
     * Proceed to the next question or finish quiz
     */
    function nextQuestion() {
        if (currentQuestionIndex < currentLesson.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    /**
     * Update score display
     */
    function updateScore() {
        currentScoreDisplay.innerText = score;
    }

    /**
     * Complete the quiz and show results
     */
    function finishQuiz() {
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'block';
        finalScoreDisplay.innerText = `${score} / ${currentLesson.length}`;
        
        // Color code final score
        const percentage = score / currentLesson.length;
        if (percentage >= 0.8) {
            finalScoreDisplay.style.color = 'var(--success)';
        } else if (percentage >= 0.5) {
            finalScoreDisplay.style.color = 'var(--text-main)';
        } else {
            finalScoreDisplay.style.color = 'var(--danger)';
        }
    }

    /**
     * Retry the same lesson
     */
    function retryQuiz() {
        startQuiz();
    }

    /**
     * Quit current quiz and return to selection screen
     */
    function quitQuiz() {
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'none';
        selectionScreen.style.display = 'block';
        
        // Reset dropdown
        lessonSelect.value = '';
    }
</script>
</body>
