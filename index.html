<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بوابة الصف العاشر</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#020617;
color:white;
text-align:center;
overflow-x:hidden;
}

header{
padding:25px;
font-size:28px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:25px;
max-width:1000px;
margin:auto;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
font-size:16px;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #38bdf8;
}

.card{
background:#0f172a;
padding:18px;
border-radius:12px;
}

iframe{
width:95%;
height:720px;
border:none;
margin-top:20px;
border-radius:10px;
}

.quiz{
background:#0f172a;
padding:20px;
border-radius:12px;
max-width:650px;
margin:30px auto;
}

.answer{
display:block;
margin:10px auto;
width:90%;
}

.hidden{
display:none;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
بوابة التعلم للصف العاشر
</header>

<h2>اختر الكتاب</h2>

<div id="books" class="grid"></div>

<div id="lessons" class="grid hidden"></div>

<div id="viewer"></div>

<div id="quiz" class="quiz hidden">

<h3 id="question"></h3>

<div id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">السؤال التالي</button>

</div>

<script>

/* BOOKS */

const books={

"الرياضيات":{
pdf:"https://elearn.azureedge.net/Books/c10/ma10-p2.pdf",
lessons:[
{name:"الدوال",page:1},
{name:"النهايات",page:20},
{name:"الاشتقاق",page:40},
{name:"التكامل",page:60}
]
},

"العربية":{
pdf:"https://elearn.azureedge.net/Books/c10/ara10-p2.pdf",
lessons:[
{name:"القراءة",page:1},
{name:"النحو",page:20},
{name:"البلاغة",page:40}
]
},

"الانجليزية":{
pdf:"https://elearn.azureedge.net/Books/c10/en10-p2.pdf",
lessons:[
{name:"Unit 1",page:1},
{name:"Unit 2",page:20},
{name:"Unit 3",page:40}
]
},

"الدين":{
pdf:"https://elearn.azureedge.net/Books/c10/re10-p2.pdf",
lessons:[
{name:"العقيدة",page:1},
{name:"السيرة",page:20}
]
},

"العلوم":{
pdf:"https://elearn.azureedge.net/Books/c10/sc10.pdf",
lessons:[
{name:"الطاقة",page:1},
{name:"القوة",page:30}
]
},

"الكيمياء":{
pdf:"https://elearn.azureedge.net/Books/c10/chm10.pdf",
lessons:[
{name:"الذرة",page:1},
{name:"التفاعلات",page:20}
]
},

"الفيزياء":{
pdf:"https://elearn.azureedge.net/Books/c10/py10.pdf",
lessons:[
{name:"الحركة",page:1},
{name:"القوة",page:25}
]
},

"الجغرافيا":{
pdf:"https://elearn.azureedge.net/Books/c10/ge10-p2.pdf",
lessons:[
{name:"المناخ",page:1},
{name:"السكان",page:20}
]
},

"تكنولوجيا المعلومات":{
pdf:"https://elearn.azureedge.net/Books/c10/it10.pdf",
lessons:[
{name:"الحاسوب",page:1},
{name:"الانترنت",page:20}
]
},

"التجويد":{
pdf:"https://elearn.azureedge.net/Books/c10/taj10.pdf",
lessons:[
{name:"مخارج الحروف",page:1},
{name:"احكام النون",page:20}
]
}

}

/* QUIZZES */

const quizzes={

"الدوال":[
{q:"الدالة هي علاقة بين؟",a:["متغيرين","زاويتين","عددين"],c:0},
{q:"قيمة f(x) تمثل؟",a:["مخرج الدالة","زاوية","مساحة"],c:0}
],

"النهايات":[
{q:"النهاية تستخدم لدراسة؟",a:["السلوك قرب نقطة","الطرح","الضرب"],c:0}
],

"القراءة":[
{q:"القراءة تساعد على؟",a:["زيادة المعرفة","تقليل المعرفة"],c:0}
]

}

let currentBook=""
let currentLesson=""
let qIndex=0

/* LOAD BOOKS */

const bookDiv=document.getElementById("books")

Object.keys(books).forEach(name=>{

let btn=document.createElement("button")
btn.innerText=name

btn.onclick=()=>openBook(name)

bookDiv.appendChild(btn)

})

/* OPEN BOOK */

function openBook(name){

currentBook=name

document.getElementById("books").style.display="none"

const lessonDiv=document.getElementById("lessons")

lessonDiv.innerHTML=""
lessonDiv.classList.remove("hidden")

books[name].lessons.forEach(l=>{

let b=document.createElement("button")

b.innerText=l.name

b.onclick=()=>openLesson(l.name,l.page)

lessonDiv.appendChild(b)

})

}

/* OPEN LESSON */

function openLesson(name,page){

currentLesson=name

document.getElementById("viewer").innerHTML=
'<iframe src="'+books[currentBook].pdf+'#page='+page+'"></iframe>'

if(quizzes[name]){

qIndex=0
loadQuestion()

document.getElementById("quiz").classList.remove("hidden")

document.getElementById("quiz").scrollIntoView({behavior:"smooth"})

}

}

/* QUIZ */

function loadQuestion(){

let q=quizzes[currentLesson][qIndex]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((ans,i)=>{

html+='<button class="answer" onclick="check('+i+')">'+ans+'</button>'

})

document.getElementById("answers").innerHTML=html
document.getElementById("result").innerText=""

}

function check(i){

if(i==quizzes[currentLesson][qIndex].c)
document.getElementById("result").innerText="✔ صحيح"
else
document.getElementById("result").innerText="✖ خطأ"

}

function nextQuestion(){

qIndex++

if(qIndex>=quizzes[currentLesson].length)
qIndex=0

loadQuestion()

}

/* BACKGROUND */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
vx:(Math.random()-.5)*.3,
vy:(Math.random()-.5)*.3
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
