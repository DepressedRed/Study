<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بوابة الصف العاشر</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
margin:0;
}

header{
font-size:28px;
padding:20px;
background:#0f172a;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

iframe{
width:95%;
height:700px;
border:none;
margin-top:20px;
}

.quiz{
background:#0f172a;
padding:20px;
border-radius:10px;
max-width:600px;
margin:20px auto;
}

.answer{
display:block;
margin:10px auto;
width:90%;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>بوابة التعلم</header>

<h2>اختر الكتاب</h2>

<div class="grid" id="books">

<button onclick="openBook('ma','الرياضيات')">الرياضيات</button>
<button onclick="openBook('ara','اللغة العربية')">العربية</button>
<button onclick="openBook('en','الانجليزية')">الانجليزية</button>
<button onclick="openBook('sc','العلوم')">العلوم</button>

</div>

<div id="lessonArea" class="hidden">

<h2 id="bookTitle"></h2>

<div id="lessons" class="grid"></div>

<button onclick="goHome()">رجوع</button>

</div>

<div id="viewer"></div>

<div id="quizArea" class="quiz hidden">

<h3 id="question"></h3>

<div id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">السؤال التالي</button>

</div>

<script>

const pdfs={
ma:"https://elearn.azureedge.net/Books/c10/ma10-p2.pdf",
ara:"https://elearn.azureedge.net/Books/c10/ara10-p2.pdf",
en:"https://elearn.azureedge.net/Books/c10/en10-p2.pdf",
sc:"https://elearn.azureedge.net/Books/c10/sc10.pdf"
}

/* LESSON TITLES */

const lessons={

ma:[
{name:"الدوال",page:1},
{name:"النهايات",page:20},
{name:"الاشتقاق",page:40}
],

ara:[
{name:"القراءة",page:1},
{name:"النحو",page:15},
{name:"البلاغة",page:30}
],

en:[
{name:"Unit 1",page:1},
{name:"Unit 2",page:20}
],

sc:[
{name:"الطاقة",page:1},
{name:"القوة",page:25}
]

}

/* QUIZZES */

const quizzes={

"الدوال":[
{q:"ما هي الدالة؟",a:["علاقة بين متغيرين","عدد فقط","زاوية"],c:0}
],

"النهايات":[
{q:"النهاية تستخدم لدراسة؟",a:["السلوك قرب نقطة","الجمع","الطرح"],c:0}
]

}

let currentBook=""
let currentLesson=""
let qIndex=0

function openBook(code,name){

currentBook=code

document.getElementById("books").style.display="none"
document.getElementById("lessonArea").classList.remove("hidden")

document.getElementById("bookTitle").innerText=name

let html=""

lessons[code].forEach(l=>{

html+=`
<button onclick="openLesson('${l.name}',${l.page})">
${l.name}
</button>
`

})

document.getElementById("lessons").innerHTML=html

}

function openLesson(name,page){

currentLesson=name

document.getElementById("viewer").innerHTML=
'<iframe src="'+pdfs[currentBook]+'#page='+page+'"></iframe>'

showQuiz()

}

function showQuiz(){

if(!quizzes[currentLesson]) return

document.getElementById("quizArea").classList.remove("hidden")

qIndex=0

loadQuestion()

document.getElementById("quizArea").scrollIntoView({behavior:"smooth"})

}

function loadQuestion(){

let q=quizzes[currentLesson][qIndex]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((ans,i)=>{

html+='<button class="answer" onclick="check('+i+')">'+ans+'</button>'

})

document.getElementById("answers").innerHTML=html

document.getElementById("result").innerText=""

}

function check(i){

if(i==quizzes[currentLesson][qIndex].c)
document.getElementById("result").innerText="✔ صحيح"
else
document.getElementById("result").innerText="✖ خطأ"

}

function nextQuestion(){

qIndex++

if(qIndex>=quizzes[currentLesson].length)
qIndex=0

loadQuestion()

}

function goHome(){

document.getElementById("books").style.display="grid"
document.getElementById("lessonArea").classList.add("hidden")
document.getElementById("viewer").innerHTML=""
document.getElementById("quizArea").classList.add("hidden")

}

</script>

</body>
</html>
