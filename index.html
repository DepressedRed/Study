<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مذاكرتي الشاملة - الصف العاشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1d7a6e; --secondary: #15a090; --bg: #fdfbf7;
            --card: #ffffff; --text: #2c3e50; --accent: #d35400; --math: #2980b9;
            --science: #8e44ad; --arabic: #c0392b; --tech: #2c3e50;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
        
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--accent); position: relative; }
        header h1 { font-family: 'Amiri', serif; font-size: 3rem; margin-bottom: 10px; }
        header p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; }

        main { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .section-header h2 { font-family: 'Amiri', serif; font-size: 2rem; color: var(--primary); }
        .badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; }

        /* Mega Grid for 10 Books */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .book-card { background: var(--card); border: 2px solid #eceae4; border-radius: 18px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .book-card::before { content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%; background: var(--primary); }
        .book-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        .book-card.active { border-color: var(--primary); background: #f0faf9; box-shadow: inset 0 0 10px rgba(29,122,110,0.1); }
        .book-card .emoji { font-size: 3.5rem; display: block; margin-bottom: 15px; transition: transform 0.3s; }
        .book-card:hover .emoji { transform: scale(1.1) rotate(5deg); }
        .book-card strong { font-size: 1.15rem; display: block; margin-bottom: 8px; color: var(--primary); }
        .book-card span { font-size: 0.85rem; color: #7f8c8d; }
        .pdf-btn { display: inline-block; margin-top: 15px; padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.75rem; text-decoration: none; color: #555; transition: 0.2s; }
        .pdf-btn:hover { background: #eee; color: var(--accent); }

        /* Lesson Selection */
        #lessonSection { display: none; margin-top: 50px; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; margin: 20px 0; }
        .lesson-btn { background: #f8f9fa; border: 1.5px solid #eee; padding: 15px; border-radius: 12px; cursor: pointer; text-align: right; font-size: 1rem; font-weight: 500; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .lesson-btn:hover { border-color: var(--secondary); background: #fff; transform: translateX(-5px); }
        .lesson-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .lesson-btn::after { content: '←'; font-weight: bold; opacity: 0.5; }

        .start-quiz-box { text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 30px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px 50px; border-radius: 12px; font-size: 1.3rem; font-weight: 800; cursor: pointer; width: 100%; max-width: 400px; transition: 0.3s; box-shadow: 0 4px 15px rgba(211, 84, 0, 0.3); }
        .btn-main:hover { background: #e67e22; transform: scale(1.02); }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* Quiz UI */
        #quizSection { display: none; margin-top: 40px; }
        .score-bar { background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        .q-card { background: white; padding: 35px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .q-num { color: var(--accent); font-weight: 800; margin-bottom: 10px; display: block; }
        .q-text { font-size: 1.3rem; font-weight: 700; color: #2c3e50; margin-bottom: 25px; }
        .opt { display: block; width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #f0f0f0; border-radius: 12px; cursor: pointer; text-align: right; font-family: inherit; font-size: 1.05rem; transition: 0.2s; background: #fff; }
        .opt:hover { border-color: var(--secondary); background: #f0faf9; }
        .opt.correct { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 700; }
        .opt.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }

        footer { text-align: center; padding: 50px; color: #95a5a6; font-size: 0.9rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .book-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>📖 منصة مذاكرتي</h1>
    <p>المختبر الدراسي الشامل لطلاب الصف العاشر - فلسطين</p>
</header>

<main>
    <div class="section-header">
        <span class="badge">الخطوة ١</span>
        <h2>اختر الكتاب المدرسي</h2>
    </div>
    <div class="book-grid" id="bookGrid"></div>

    <div id="lessonSection">
        <div class="section-header">
            <span class="badge">الخطوة ٢</span>
            <h2>اختر الدرس للمراجعة</h2>
        </div>
        <div class="lesson-grid" id="lessonGrid"></div>
        <div class="start-quiz-box">
            <button class="btn-main" id="startBtn" disabled onclick="startQuiz()">توليد الاختبار ✦</button>
        </div>
    </div>

    <div id="quizSection">
        <div class="score-bar">
            <span>اختبار: <strong id="lessonTitleDisplay"></strong></span>
            <span id="scoreDisplay">النتيجة: ٠ / ٠</span>
        </div>
        <div id="quizContent"></div>
        <button class="btn-main" onclick="window.scrollTo({top:0, behavior:'smooth'})">العودة للأعلى ⬆</button>
    </div>
</main>

<footer>
    تم تطوير هذا الموقع لمساعدة الطلاب في مراجعة دروسهم خطوة بخطوة.<br>
    جميع الحقوق محفوظة للمنهاج الفلسطيني.
</footer>

<script>
/** * DATASET: ALL BOOKS AND LESSONS
 * I have added all 10 PDFs and organized them.
 */
const DATA = {
    "ma": {
        name: "الرياضيات", emoji: "📐", url: "https://elearn.azureedge.net/Books/c10/ma10-p2.pdf",
        lessons: {
            "المتتاليات الحسابية": [
                { q: "ما هو قانون الحد العام للمتتالية الحسابية؟", options: ["ح ن = أ + (ن-1)د", "ح ن = أ + ن د", "ح ن = أ × ر ^(ن-1)"], correct: 0 },
                { q: "متتالية حسابية حدها الأول 5 وأساسها 3، ما هو حدها الثاني؟", options: ["2", "8", "15"], correct: 1 }
            ],
            "المتتاليات الهندسية": [
                { q: "النسبة الثابتة في المتتالية الهندسية تسمى:", options: ["الأساس (د)", "الأساس (ر)", "الفرق المشترك"], correct: 1 }
            ],
            "الإحصاء والارتباط": [
                { q: "قيمة معامل ارتباط بيرسون المحصورة دائماً بين:", options: ["0 و 1", "-1 و 1", "0 و 100"], correct: 1 }
            ]
        }
    },
    "ara": {
        name: "اللغة العربية", emoji: "📝", url: "https://elearn.azureedge.net/Books/c10/ara10-p2.pdf",
        lessons: {
            "نحو: معاني الحروف": [
                { q: "ماذا تفيد 'من' في جملة 'سرت من البيت'؟", options: ["التبعيض", "بيان الجنس", "ابتداء الغاية المكانية"], correct: 2 }
            ],
            "بلاغة: التشبيه": [
                { q: "أركان التشبيه هي المشبه والمشبه به و...:", options: ["الأداة ووجه الشبه", "الفعل والفاعل", "الصفة والموصوف"], correct: 0 }
            ]
        }
    },
    "sc": {
        name: "العلوم الحياتية", emoji: "🔬", url: "https://elearn.azureedge.net/Books/c10/sc10.pdf",
        lessons: {
            "وراثة الصفات": [
                { q: "مؤسس علم الوراثة هو العالم:", options: ["باستور", "مندل", "نيوتن"], correct: 1 }
            ],
            "أجهزة جسم الإنسان": [
                { q: "العضو المسؤول عن تنقية الدم من الفضلات السائلة هو:", options: ["القلب", "الكلية", "الرئة"], correct: 1 }
            ]
        }
    },
    "py": {
        name: "الفيزياء", emoji: "⚡", url: "https://elearn.azureedge.net/Books/c10/py10.pdf",
        lessons: {
            "المرايا": [
                { q: "المرآة التي تكون دائماً صوراً معتدلة وهمية مصغرة هي:", options: ["المقعرة", "المحدبة", "المستوية"], correct: 1 }
            ],
            "الكهرباء": [
                { q: "وحدة قياس المقاومة الكهربائية هي:", options: ["فولت", "أمبير", "أوم"], correct: 2 }
            ]
        }
    },
    "chm": {
        name: "الكيمياء", emoji: "⚗️", url: "https://elearn.azureedge.net/Books/c10/chm10.pdf",
        lessons: {
            "الروابط الكيميائية": [
                { q: "الرابطة الناتجة عن تشارك الزوج الإلكتروني هي:", options: ["أيونية", "تساهمية", "فلزية"], correct: 1 }
            ]
        }
    },
    "it": {
        name: "التكنولوجيا", emoji: "💻", url: "https://elearn.azureedge.net/Books/c10/it10.pdf",
        lessons: {
            "شبكات الاتصال": [
                { q: "تعتبر شبكة الإنترنت مثالاً على الشبكات:", options: ["المحلية LAN", "الواسعة WAN", "الشخصية PAN"], correct: 1 }
            ]
        }
    },
    "ge": {
        name: "الجغرافيا", emoji: "🗺️", url: "https://elearn.azureedge.net/Books/c10/ge10-p2.pdf",
        lessons: {
            "جغرافية فلسطين": [
                { q: "يحد فلسطين من الغرب:", options: ["البحر الميت", "البحر المتوسط", "الأردن"], correct: 1 }
            ]
        }
    },
    "re": {
        name: "التربية الإسلامية", emoji: "🌙", url: "https://elearn.azureedge.net/Books/c10/re10-p2.pdf",
        lessons: {
            "القرآن الكريم": [
                { q: "عدد سور القرآن الكريم هو:", options: ["110", "114", "120"], correct: 1 }
            ]
        }
    },
    "en": {
        name: "English", emoji: "🔤", url: "https://elearn.azureedge.net/Books/c10/en10-p2.pdf",
        lessons: {
            "Unit 7: Progress": [
                { q: "The past tense of 'go' is:", options: ["gone", "goes", "went"], correct: 2 }
            ]
        }
    },
    "taj": {
        name: "التلاوة والتجويد", emoji: "📿", url: "https://elearn.azureedge.net/Books/c10/taj10.pdf",
        lessons: {
            "أحكام النون الساكنة": [
                { q: "الإدغام يقع في كم حرف؟", options: ["4 حروف", "6 حروف (يرملون)", "حرف واحد"], correct: 1 }
            ]
        }
    }
};

let selectedBook = null;
let selectedLesson = null;
let score = 0;

function init() {
    const grid = document.getElementById('bookGrid');
    for (let id in DATA) {
        const b = DATA[id];
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            <span class="emoji">${b.emoji}</span>
            <strong>${b.name}</strong>
            <span>الصف العاشر</span>
            <br>
            <a href="${b.url}" target="_blank" class="pdf-btn" onclick="event.stopPropagation()">تحميل PDF ⬇</a>
        `;
        card.onclick = () => selectBook(id, card);
        grid.appendChild(card);
    }
}

function selectBook(id, el) {
    selectedBook = id;
    selectedLesson = null;
    document.querySelectorAll('.book-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    
    const lessonGrid = document.getElementById('lessonGrid');
    lessonGrid.innerHTML = '';
    const lessons = DATA[id].lessons;
    
    for (let lName in lessons) {
        const lBtn = document.createElement('div');
        lBtn.className = 'lesson-btn';
        lBtn.textContent = lName;
        lBtn.onclick = () => {
            selectedLesson = lName;
            document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
            lBtn.classList.add('active');
            document.getElementById('startBtn').disabled = false;
        };
        lessonGrid.appendChild(lBtn);
    }

    document.getElementById('lessonSection').style.display = 'block';
    document.getElementById('quizSection').style.display = 'none';
    window.scrollTo({ top: document.getElementById('lessonSection').offsetTop - 50, behavior: 'smooth' });
}

function startQuiz() {
    const questions = DATA[selectedBook].lessons[selectedLesson];
    const container = document.getElementById('quizContent');
    container.innerHTML = '';
    score = 0;
    
    document.getElementById('lessonTitleDisplay').textContent = selectedLesson;
    updateScoreDisplay(0, questions.length);

    questions.forEach((qData, qIdx) => {
        const qCard = document.createElement('div');
        qCard.className = 'q-card';
        qCard.innerHTML = `
            <span class="q-num">السؤال ${qIdx + 1}</span>
            <div class="q-text">${qData.q}</div>
        `;
        
        qData.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.textContent = opt;
            btn.onclick = () => {
                const parent = btn.parentElement;
                if (parent.classList.contains('locked')) return;
                
                parent.classList.add('locked');
                if (oIdx === qData.correct) {
                    btn.classList.add('correct');
                    score++;
                } else {
                    btn.classList.add('wrong');
                    parent.querySelectorAll('.opt')[qData.correct].classList.add('correct');
                }
                updateScoreDisplay(score, questions.length);
            };
            qCard.appendChild(btn);
        });
        container.appendChild(qCard);
    });

    document.getElementById('quizSection').style.display = 'block';
    window.scrollTo({ top: document.getElementById('quizSection').offsetTop - 20, behavior: 'smooth' });
}

function updateScoreDisplay(s, total) {
    document.getElementById('scoreDisplay').textContent = `النتيجة: ${s} / ${total}`;
}

init();
</script>
</body>
</html>
