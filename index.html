<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مذاكرتي - الصف العاشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1d7a6e; --secondary: #15a090; --bg: #f8f6f2;
            --card: #ffffff; --text: #2c3e50; --accent: #e67e22;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        
        /* Header */
        header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        header h1 { font-family: 'Amiri', serif; font-size: 2.8rem; margin: 0; }
        header p { margin: 10px 0 0; opacity: 0.9; font-size: 1.1rem; }

        main { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        /* Steps & Titles */
        .step-num { background: var(--accent); color: white; width: 30px; height: 30px; display: inline-flex; 
                   align-items: center; justify-content: center; border-radius: 50%; margin-left: 10px; font-weight: bold; }
        h2 { font-family: 'Amiri', serif; color: var(--primary); display: flex; align-items: center; }

        /* Book Grid */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .book-card { background: var(--card); border: 2px solid #e0e0e0; border-radius: 15px; padding: 20px; 
                    text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .book-card.active { border-color: var(--primary); background: #e8f4f2; }
        .book-card .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }
        .book-card .book-link { display: block; margin-top: 10px; font-size: 0.8rem; color: #7f8c8d; text-decoration: none; }
        .book-card .book-link:hover { text-decoration: underline; }

        /* Lesson Selection */
        #lessonSection { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .lesson-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .lesson-pill { background: #f0f0f0; border: 1px solid #ddd; padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: 0.2s; }
        .lesson-pill:hover { background: #e0e0e0; }
        .lesson-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Quiz Area */
        #quizSection { display: none; }
        .q-card { background: white; padding: 30px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .q-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        .option { display: block; width: 100%; text-align: right; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; 
                 border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; background: #fff; }
        .option:hover { background: #f9f9f9; border-color: var(--secondary); }
        .option.correct { background: #d4edda; border-color: #28a745; color: #155724; font-weight: bold; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        /* Progress & Buttons */
        .btn-gen { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 10px; 
                  font-size: 1.2rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn-gen:disabled { background: #ccc; cursor: not-allowed; }
        .score-box { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 1.2rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .book-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>📖 مذاكرتي المدرسية</h1>
    <p>بوابتك لدراسة كتب المنهاج الفلسطيني - الصف العاشر</p>
</header>

<main>
    <section>
        <h2><span class="step-num">١</span> اختر المادة الدراسية</h2>
        <div class="book-grid" id="bookGrid"></div>
    </section>

    <section id="lessonSection">
        <h2><span class="step-num">٢</span> اختر الوحدة أو الدرس</h2>
        <div class="lesson-container" id="lessonGrid"></div>
        <button class="btn-gen" id="startBtn" disabled onclick="generateQuiz()">ابدأ الاختبار الآن ✦</button>
    </section>

    <section id="quizSection">
        <div class="score-box" id="scoreBox">النتيجة: ٠ / ٠</div>
        <div id="quizContent"></div>
    </section>
</main>

<script>
/** * DATASET: This is where you and your friends can add more questions manually.
 * I have pre-filled some examples based on common Grade 10 Palestinian curriculum.
 */
const DATA = {
    "ma": {
        name: "الرياضيات", emoji: "📐", url: "https://elearn.azureedge.net/Books/c10/ma10-p2.pdf",
        lessons: {
            "المتتاليات": [
                { q: "ما هو الحد العام للمتتالية الحسابية التي حدها الأول (أ) وأساسها (د)؟", options: ["ح ن = أ + (ن-1)د", "ح ن = أ + ن د", "ح ن = أ + (ن+1)د"], correct: 0 },
                { q: "في المتتالية الهندسية، نحصل على الأساس (ر) من خلال:", options: ["طرح حدين متتاليين", "جمع حدين متتاليين", "قسمة حد على الحد السابق له مباشرة"], correct: 2 }
            ],
            "الإحصاء": [
                { q: "الوسط الحسابي للقيم (٢، ٤، ٦) هو:", options: ["٤", "٥", "٦"], correct: 0 }
            ]
        }
    },
    "ara": {
        name: "اللغة العربية", emoji: "📝", url: "https://elearn.azureedge.net/Books/c10/ara10-p2.pdf",
        lessons: {
            "نحو: معاني الحروف": [
                { q: "ما المعنى الذي تفيده 'لا' في جملة 'لا تهمل واجبك'؟", options: ["النفي", "النهي", "العطف"], correct: 1 }
            ]
        }
    },
    "py": {
        name: "الفيزياء", emoji: "⚡", url: "https://elearn.azureedge.net/Books/c10/py10.pdf",
        lessons: {
            "المرايا والعدسات": [
                { q: "المرآة التي تعمل على تجميع الأشعة المتوازية الساقطة عليها هي:", options: ["المرآة المقعرة", "المرآة المحدبة", "المرآة المستوية"], correct: 0 }
            ]
        }
    }
    // You can add 'chm', 'it', 're', etc. here following the same format
};

let currentBook = null;
let currentLesson = null;
let score = 0;
let totalAsked = 0;

// Initialize Book Cards
function init() {
    const grid = document.getElementById('bookGrid');
    for (let id in DATA) {
        const b = DATA[id];
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            <span class="emoji">${b.emoji}</span>
            <strong>${b.name}</strong>
            <a href="${b.url}" target="_blank" class="book-link" onclick="event.stopPropagation()">تحميل الكتاب PDF 📥</a>
        `;
        card.onclick = () => selectBook(id, card);
        grid.appendChild(card);
    }
}

function selectBook(id, element) {
    currentBook = id;
    currentLesson = null;
    document.querySelectorAll('.book-card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    
    // Show Lessons
    const lessonGrid = document.getElementById('lessonGrid');
    lessonGrid.innerHTML = '';
    const lessons = Object.keys(DATA[id].lessons);
    
    lessons.forEach(l => {
        const pill = document.createElement('div');
        pill.className = 'lesson-pill';
        pill.textContent = l;
        pill.onclick = () => {
            currentLesson = l;
            document.querySelectorAll('.lesson-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            document.getElementById('startBtn').disabled = false;
        };
        lessonGrid.appendChild(pill);
    });

    document.getElementById('lessonSection').style.display = 'block';
    document.getElementById('quizSection').style.display = 'none';
}

function generateQuiz() {
    const questions = DATA[currentBook].lessons[currentLesson];
    const container = document.getElementById('quizContent');
    container.innerHTML = '';
    score = 0;
    totalAsked = questions.length;
    updateScore();

    questions.forEach((item, qIdx) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${item.q}</div>`;
        
        item.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = opt;
            btn.onclick = () => {
                if (btn.parentElement.classList.contains('answered')) return;
                
                btn.parentElement.classList.add('answered');
                if (oIdx === item.correct) {
                    btn.classList.add('correct');
                    score++;
                } else {
                    btn.classList.add('wrong');
                    btn.parentElement.querySelectorAll('.option')[item.correct].classList.add('correct');
                }
                updateScore();
            };
            card.appendChild(btn);
        });
        container.appendChild(card);
    });

    document.getElementById('quizSection').style.display = 'block';
    window.scrollTo({ top: document.getElementById('quizSection').offsetTop, behavior: 'smooth' });
}

function updateScore() {
    document.getElementById('scoreBox').textContent = `النتيجة: ${score} / ${totalAsked}`;
}

init();
</script>
</body>
</html>
